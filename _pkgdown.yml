url: https://causalfragility-lab.github.io/RobustMediate

template:
  bootstrap: 5

navbar:
  structure:
    left: [intro, reference, articles]
    right: [github]
  components:
    github:
      icon: fab fa-github
      aria-label: GitHub
      href: https://github.com/causalfragility-lab/RobustMediate

reference:
  - title: "Main fitting function"
    contents:
      - robustmediate

  - title: "Print and summary methods"
    contents:
      - print.robmedfit
      - summary.robmedfit
      - plot.robmedfit

  - title: "Mediation ITCV (medITCV)"
    desc: "Pathway-specific robustness via mediation ITCV"
    contents:
      - sensitivity_meditcv
      - print.meditcv
      - plot_meditcv
      - sensitivity_meditcv_profile
      - print.meditcv_profile
      - plot_meditcv_profile
      - fragility_table

  - title: "Sensitivity analysis"
    desc: "E-value, rho surface, and curvature-based fragility"
    contents:
      - sensitivity_curvature
      - plot_curvature

  - title: "Plots"
    desc: "Visualisation functions"
    contents:
      - plot_balance
      - plot_mediation
      - plot_sensitivity

  - title: "Diagnostics and utilities"
    contents:
      - diagnose
      - tipping_table
      - compare_fits

  - title: "broom methods"
    contents:
      - tidy.robmedfit
      - glance.robmedfit
      - augment.robmedfit
      - as.data.frame.robmedfit

  - title: "Data"
    contents:
      - sim_mediation

  - title: "Package"
    contents:
      - RobustMediate-package

